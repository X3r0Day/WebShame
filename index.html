<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebShame | Hall of Shame</title>
    <meta
      name="description"
      content="Static Hall of Shame interface for reviewing sanitized XeroDay-APISniffer findings on GitHub Pages."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/styles.css" />
    <script defer src="assets/app.js"></script>
  </head>
  <body>
    <div class="page-shell">
      <header class="top-nav">
        <div class="brand">WebShame</div>
        <nav class="nav-links" aria-label="Primary">
          <a class="nav-link active" href="index.html">Overview</a>
          <a class="nav-link" href="live.html">Live Keys</a>
          <a class="nav-link" href="leaderboard.html">Leaderboards</a>
        </nav>
      </header>

      <header class="hero">
        <div class="hero-copy">
          <h1>Hall of Shame</h1>
          <div class="meta-line">Sanitized leak index.</div>
        </div>
      </header>

      <main class="content">
        <section class="controls-panel" id="board" aria-label="Filters">
          <label class="control">
            <span>Search</span>
            <input
              id="search-input"
              type="search"
              placeholder="Repo, file, or provider"
              autocomplete="off"
            />
          </label>

          <label class="control">
            <span>Severity</span>
            <select id="severity-filter">
              <option value="all">All levels</option>
              <option value="critical">Critical</option>
              <option value="high">High</option>
              <option value="medium">Medium</option>
              <option value="low">Low</option>
            </select>
          </label>

          <label class="control">
            <span>Provider</span>
            <select id="provider-filter">
              <option value="all">All providers</option>
            </select>
          </label>

          <label class="control">
            <span>Source</span>
            <select id="source-filter">
              <option value="all">Files and commits</option>
              <option value="file">Files only</option>
              <option value="commit">Commit history</option>
            </select>
          </label>

          <label class="control">
            <span>Sort</span>
            <select id="sort-select">
              <option value="score">Exposure score</option>
              <option value="secrets">Secret count</option>
              <option value="repo">Repo name</option>
              <option value="scan">Fastest scan</option>
            </select>
          </label>
        </section>

        <section class="site-info" id="info" aria-label="Site info">
          <div class="meta-line">Site: /WebShame</div>
          <div class="meta-line">Data: data/hall-of-shame.json (sanitized)</div>
          <div class="meta-line">Refresh: GitHub Actions schedule</div>
        </section>

        <section class="dashboard">
          <div class="board-column">
            <div class="section-heading">
              <div>
                <p class="eyebrow">Board</p>
                <h2>Public Snapshot</h2>
              </div>
              <p class="dataset-meta" id="dataset-meta">Loading...</p>
            </div>

            <div class="status-banner" id="status-banner" hidden></div>
            <div class="repo-grid" id="repo-grid" aria-live="polite"></div>
            <div class="empty-state" id="empty-state" hidden>
              <h3>No matches.</h3>
            </div>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
