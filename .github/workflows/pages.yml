name: Deploy WebShame Pages

on:
  push:
    branches:
      - main
    paths:
      - index.html
      - live.html
      - leaderboard.html
      - assets/**
      - data/**
      - .nojekyll
      - .github/workflows/pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out site repository
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build Pages artifact
        run: |
          mkdir -p site-dist
          cp index.html site-dist/
          cp live.html site-dist/
          cp leaderboard.html site-dist/
          cp .nojekyll site-dist/
          cp -R assets site-dist/assets
          cp -R data site-dist/data

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site-dist

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
